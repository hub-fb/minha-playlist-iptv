name: Atualizar lista de reprodução IPTV

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Construir lista IPTV consolidada
        run: |
          set -e

          TMP="all.m3u"
          OUT="ListaIPTV.m3u"

          echo "#EXTM3U" > "$TMP"

          # lista base (sua própria lista)
          curl -fsSL "https://raw.githubusercontent.com/fabianobassetti-dotcom/minha-playlist-iptv/main/ListaIPTV.m3u" \
            | sed '/^#EXTM3U/d' >> "$TMP" || true

          echo "Lendo fontes.txt..."

          while IFS= read -r URL || [ -n "$URL" ]; do

            [ -z "$URL" ] && continue

            echo "Importando: $URL"

            curl -fsSL "$URL" \
              | sed '/^#EXTM3U/d' \
              | sed '/^[[:space:]]*$/d' >> "$TMP" || echo "Falha: $URL"

          done < fontes.txt

          # deduplicação robusta EXTINF + URL
          awk '
          BEGIN { extinf=""; grp="" }

          /^#EXTGRP/ { grp=$0; next }

          /^#EXTINF/ {
            extinf=$0
            next
          }

          /^[[:space:]]*$/ { next }

          {
            if (extinf && $0 ~ /^http/) {
              url=$0

              cmd = "printf \"%s\" \"" url "\" | sha1sum"
              cmd | getline h
              close(cmd)

              split(h, arr, " ")
              key = extinf "|" arr[1]

              if (!(key in seen)) {
                seen[key]=1

                if (grp != "") print grp
                print extinf
                print url
              }

              extinf=""
            }
          }
          ' "$TMP" > "$OUT"

          echo "#EXTM3U" | cat - "$OUT" > tmp && mv tmp "$OUT"

          if [ ! -s "$OUT" ]; then
            echo "Erro: lista final vazia"
            exit 1
          fi

      - name: Commit e push
        run: |
          git config user.name "GitHub Action"
          git config user.email "actions@github.com"

          git add ListaIPTV.m3u

          if ! git diff --cached --quiet; then
            git commit -m "Atualização IPTV consolidada"
            git push
          else
            echo "Nenhuma alteração detectada"
          fi
